<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial · Admin — Fixtures</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>
body { background: #f5f2ec; }
</style>
</head>
<body>

<div class="container py-4" style="max-width: 720px">
  <div class="d-flex align-items-baseline gap-3 mb-4">
    <h1 class="fs-4 fw-bold mb-0">Mundial · Admin — Fixtures</h1>
    <a href="/admin-auth" class="text-muted small ms-auto">Users →</a>
  </div>

  <!-- Not signed in -->
  <div id="signed-out">
    <p class="text-muted">Sign in with Google to continue.</p>
    <div id="g_id_onload"
         data-client_id="657438044008-qddq7m5mgk59k8qnhjpd6dalndqqb50e.apps.googleusercontent.com"
         data-callback="onGoogleSignIn"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline"></div>
  </div>

  <!-- Signed in -->
  <div id="signed-in" class="d-none">
    <div class="card mb-3">
      <div class="card-body d-flex align-items-center gap-3">
        <img id="user-pic" class="rounded-circle" width="48" height="48" alt="">
        <div>
          <div id="user-name" class="fw-bold"></div>
          <div id="user-email" class="text-muted small"></div>
        </div>
        <span id="ws-status" class="badge bg-secondary ms-auto">connecting…</span>
      </div>
    </div>

    <!-- Admin section -->
    <div id="admin-section" class="d-none">
      <div class="card mb-3">
        <div class="card-body">
          <div style="display:grid; grid-template-columns: auto 1fr; align-items:center; gap:8px 12px;">
            <div class="d-flex align-items-center gap-2">
              <span id="discover-status" class="badge bg-secondary">off</span>
              <span class="fw-bold">Discover</span>
            </div>
            <div class="d-flex gap-2 justify-content-end">
              <button id="wc-filter" class="btn btn-sm btn-outline-warning" onclick="toggleWcFilter()">WC only</button>
              <button class="btn btn-sm btn-outline-info" onclick="discoverFixtures()">Once</button>
              <button id="discover-toggle" class="btn btn-sm btn-outline-success" onclick="toggleDiscover()">Start</button>
            </div>

            <div class="d-flex align-items-center gap-2">
              <span id="track-status" class="badge bg-secondary">off</span>
              <span class="fw-bold">Auto-Track</span>
            </div>
            <div class="d-flex gap-2 justify-content-end">
              <button id="track-toggle" class="btn btn-sm btn-outline-success" onclick="toggleTrack()">Set</button>
            </div>
          </div>
          <div id="fixture-list" class="mt-2"></div>
        </div>
      </div>
    </div>

    <div id="not-admin" class="d-none">
      <p class="text-muted">You are signed in but do not have admin access.</p>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4/dist/socket.io.min.js"></script>
<script>
const BACKEND = window.location.origin;
let socket = null;

async function onGoogleSignIn(response) {
  const r = await fetch(`${BACKEND}/api/auth/google`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    credentials: 'include',
    body: JSON.stringify({credential: response.credential})
  });
  const data = await r.json();
  if (data.user) showUser(data.user, data.admin);
}

async function checkSession() {
  try {
    const r = await fetch(`${BACKEND}/api/auth/me`, {credentials: 'include'});
    const data = await r.json();
    if (data.user) showUser(data.user, data.admin);
  } catch {}
}

function showUser(user, isAdmin) {
  document.getElementById('signed-out').classList.add('d-none');
  document.getElementById('signed-in').classList.remove('d-none');
  document.getElementById('user-pic').src = user.picture;
  document.getElementById('user-name').textContent = user.name;
  document.getElementById('user-email').textContent = user.email;
  if (isAdmin) {
    document.getElementById('admin-section').classList.remove('d-none');
    loadPollStatus();
    connectWebSocket();
  } else {
    document.getElementById('not-admin').classList.remove('d-none');
  }
}

function showSignedOut() {
  if (socket) socket.disconnect();
  document.getElementById('signed-in').classList.add('d-none');
  document.getElementById('admin-section').classList.add('d-none');
  document.getElementById('not-admin').classList.add('d-none');
  document.getElementById('signed-out').classList.remove('d-none');
}

function connectWebSocket() {
  const badge = document.getElementById('ws-status');
  socket = io(BACKEND, {transports: ['websocket']});

  socket.on('connect', () => {
    badge.textContent = 'live';
    badge.className = 'badge bg-success ms-auto';
    loadPollStatus();
  });

  socket.on('disconnect', () => {
    badge.textContent = 'disconnected';
    badge.className = 'badge bg-danger ms-auto';
  });

  socket.on('poll_status', updatePollUI);

  socket.on('user_kicked', ({email, sid}) => {
    const myEmail = document.getElementById('user-email')?.textContent;
    const isMe = sid ? false : email === myEmail;
    if (isMe) {
      fetch(BACKEND + '/api/auth/logout', {method: 'POST', credentials: 'include'}).catch(() => {});
      showSignedOut();
    }
  });
}

async function loadPollStatus() {
  try {
    const r = await fetch(`${BACKEND}/api/admin/poll/status`, {credentials: 'include'});
    if (!r.ok) return;
    updatePollUI(await r.json());
  } catch {}
}

function updateToggle(badgeId, btnId, active, onLabel = 'Stop', offLabel = 'Start') {
  const badge = document.getElementById(badgeId);
  const btn = document.getElementById(btnId);
  if (active) {
    badge.textContent = 'on';
    badge.className = 'badge bg-success';
    btn.textContent = onLabel;
    btn.className = 'btn btn-sm btn-outline-danger';
  } else {
    badge.textContent = 'off';
    badge.className = 'badge bg-secondary';
    btn.textContent = offLabel;
    btn.className = 'btn btn-sm btn-outline-success';
  }
}

const STATUS_COLORS = {
  '1H': 'bg-success', '2H': 'bg-success', 'ET': 'bg-success', 'P': 'bg-success',
  'HT': 'bg-warning text-dark', 'BT': 'bg-warning text-dark',
  'FT': 'bg-secondary', 'AET': 'bg-secondary', 'PEN': 'bg-secondary',
};

function renderFixtures(fixtures) {
  const el = document.getElementById('fixture-list');
  const entries = Object.entries(fixtures || {});
  if (entries.length === 0) {
    el.innerHTML = '<div class="text-muted small mt-1">No fixtures discovered.</div>';
    return;
  }
  const anyTracked = entries.some(([, f]) => f.tracked);
  const allTracked = entries.every(([, f]) => f.tracked);
  const grid = `display:grid; grid-template-columns:1fr auto; align-items:center; gap:4px 12px;`;
  el.innerHTML =
    `<div style="${grid} border-top:1px solid #e5e5e5; padding-top:8px;">
      <div></div>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-success" onclick="trackAll(true)" ${allTracked ? 'disabled' : ''}>Start all</button>
        <button class="btn btn-sm btn-outline-danger" onclick="trackAll(false)" ${!anyTracked ? 'disabled' : ''}>Stop all</button>
      </div>` +
    entries.map(([fid, f]) => {
      const statusCls = STATUS_COLORS[f.status] || 'bg-info';
      const trackedCls = f.tracked ? 'bg-success' : 'bg-secondary';
      const btnCls = f.tracked ? 'btn-outline-danger' : 'btn-outline-success';
      const btnLabel = f.tracked ? 'Stop' : 'Start';
      return `
      <div class="d-flex align-items-center gap-2" style="font-size:13px">
        <span class="badge ${statusCls}">${f.status || '?'}</span>
        <span class="badge ${trackedCls}">${f.tracked ? 'on' : 'off'}</span>
        <span>${f.label}</span>
      </div>
      <div class="text-end">
        <button class="btn btn-sm ${btnCls} py-0 px-2" style="font-size:11px" onclick="trackFixture(${fid}, ${!f.tracked})">${btnLabel}</button>
      </div>`;
    }).join('') + `</div>`;
}

function updatePollUI({discovering, tracking, fixtures, wc_only}) {
  updateToggle('discover-status', 'discover-toggle', discovering);
  if (tracking !== undefined) updateToggle('track-status', 'track-toggle', tracking, 'Unset', 'Set');
  renderFixtures(fixtures);
  if (wc_only !== undefined) {
    const wcBtn = document.getElementById('wc-filter');
    wcBtn.textContent = wc_only ? 'WC only' : 'All leagues';
    wcBtn.className = wc_only ? 'btn btn-sm btn-outline-warning' : 'btn btn-sm btn-warning';
  }
}

async function toggleDiscover() {
  const isOn = document.getElementById('discover-status').textContent === 'on';
  await fetch(BACKEND + (isOn ? '/api/admin/poll/stop' : '/api/admin/poll/start'), {method: 'POST', credentials: 'include'});
}

async function toggleTrack() {
  const isOn = document.getElementById('track-status').textContent === 'on';
  const r = await fetch(BACKEND + (isOn ? '/api/admin/track/stop' : '/api/admin/track/start'), {method: 'POST', credentials: 'include'});
  const data = await r.json();
  if (data.ok) updateToggle('track-status', 'track-toggle', data.tracking, 'Unset', 'Set');
}

async function toggleWcFilter() {
  const r = await fetch(BACKEND + '/api/admin/poll/wc-filter', {method: 'POST', credentials: 'include'});
  const data = await r.json();
  if (data.ok) {
    const wcBtn = document.getElementById('wc-filter');
    wcBtn.textContent = data.wc_only ? 'WC only' : 'All leagues';
    wcBtn.className = data.wc_only ? 'btn btn-sm btn-outline-warning' : 'btn btn-sm btn-warning';
  }
}

async function trackFixture(fid, tracked) {
  try {
    await fetch(BACKEND + '/api/admin/track/fixture', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({fid, tracked})
    });
  } catch { showToast('Request failed — check connection'); }
}

async function trackAll(tracked) {
  try {
    await fetch(BACKEND + '/api/admin/track/all', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({tracked})
    });
  } catch { showToast('Request failed — check connection'); }
}

async function discoverFixtures() {
  const r = await fetch(BACKEND + '/api/admin/poll/discover', {method: 'POST', credentials: 'include'});
  const data = await r.json();
  if ((data.fixtures ?? []).length === 0) showToast('No live fixtures found');
}

function showToast(msg) {
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    container.className = 'position-fixed top-0 end-0 p-3';
    container.style.zIndex = 1080;
    document.body.appendChild(container);
  }
  const el = document.createElement('div');
  el.className = 'toast align-items-center text-bg-warning border-0';
  el.setAttribute('role', 'alert');
  el.innerHTML = `<div class="d-flex"><div class="toast-body">${msg}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
  container.appendChild(el);
  const toast = new bootstrap.Toast(el, {delay: 3000});
  toast.show();
  el.addEventListener('hidden.bs.toast', () => el.remove());
}

checkSession();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
